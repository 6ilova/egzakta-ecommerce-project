---
# ============================================
# Main Ansible Playbook
# ============================================
#
# Configures an Ubuntu VM with:
#   - Docker & Docker Compose (for running the app)
#   - Node Exporter (Prometheus metrics on port 9100)
#   - SSH on port 222 (changed from default 22 for security)
#   - UFW firewall (allow only ports 222, 8000, 9100)
#   - GitLab Runner (CI/CD worker)
#
# USAGE (via Vagrant's ansible_local provisioner):
#   # Run all roles:
#   vagrant provision
#
#   # Or run manually from inside the VM:
#   vagrant ssh
#   cd /vagrant/ansible
#   ansible-playbook playbook.yml -i inventory/hosts.yml
#
#   # Register GitLab Runner (with token from GitLab UI):
#   ansible-playbook playbook.yml -i inventory/hosts.yml --tags gitlab_runner \
#     -e "gitlab_runner_token=YOUR_TOKEN"
#
# ROLE EXECUTION ORDER — WHY THIS ORDER MATTERS:
#   1. docker       — Install first, other tools depend on it
#   2. node_exporter — Independent service, install early
#   3. sshd          — Change SSH port BEFORE enabling firewall
#   4. ufw           — Enable firewall AFTER SSH port is changed
#                      (otherwise we'd lock ourselves out by blocking port 22
#                       before SSH moves to 222)
#   5. gitlab_runner — Last, because it needs Docker and network access
# ============================================

- name: Configure Ubuntu VM for E-Commerce Application
  hosts: all
  become: true

  vars:
    ssh_port: 222
    node_exporter_version: "1.7.0"
    deploy_user: vagrant

  roles:
    - role: docker
      tags: docker
    - role: node_exporter
      tags: node_exporter
    - role: sshd
      tags: sshd
    - role: ufw
      tags: ufw
    - role: gitlab_runner
      tags: gitlab_runner
