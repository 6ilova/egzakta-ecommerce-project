---
# ============================================
# Role: Docker
# Install Docker CE and Docker Compose Plugin
# ============================================
#
# WHY Docker CE (not docker.io from Ubuntu repos):
#   Ubuntu's docker.io package is outdated and missing Docker Compose V2.
#   Docker CE from Docker's official repo is always up-to-date and includes
#   the 'docker compose' plugin (V2) which replaces the old docker-compose.
#
# WHY we install python3-pip + Docker SDK:
#   Ansible's docker_* modules (for managing containers/images) require
#   the Python Docker SDK. We install it for potential future use.
# ============================================

- name: Install prerequisite packages
  apt:
    name:
      - apt-transport-https    # HTTPS transport for apt
      - ca-certificates        # SSL certificate verification
      - curl                   # Download Docker GPG key
      - gnupg                  # GPG key management
      - lsb-release            # Detect Ubuntu release name
      - software-properties-common  # manage apt repos
      - python3-pip            # Needed for Docker SDK
    state: present
    update_cache: yes

- name: Add Docker's official GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    # ansible_distribution_release = "focal" for Ubuntu 20.04
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    update_cache: yes

- name: Install Docker CE packages
  apt:
    name:
      - docker-ce              # Docker daemon
      - docker-ce-cli          # Docker CLI
      - containerd.io          # Container runtime
      - docker-compose-plugin  # 'docker compose' V2 command
    state: present

- name: Add deploy user to docker group
  user:
    name: "{{ deploy_user }}"
    groups: docker
    append: yes
  # WHY: Without this, the deploy user would need 'sudo' for every
  # docker command. Adding to the 'docker' group allows rootless usage.

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Install Docker SDK for Python
  pip:
    name: docker
    state: present
  # WHY: Ansible's community.docker modules need this SDK.
  # Even if not used now, it's good practice to have it installed.
