---
# ============================================
# Ansible Inventory — Target Hosts
# ============================================
#
# WHY YAML format (not INI):
#   YAML supports nested variables and is more readable for complex
#   inventories. The INI format works too but becomes messy with many vars.
#
# CONNECTION MODEL:
#   Ansible runs INSIDE the VM via Vagrant's ansible_local provisioner.
#   The connection type is 'local' (no SSH needed — Ansible talks to
#   the same machine it's running on).
#
# HOW TO RUN:
#   vagrant provision                                    # Run all roles
#   vagrant provision --provision-with ansible_local     # Run only Ansible
# ============================================

all:
  hosts:
    ecommerce-vm:
      ansible_host: 127.0.0.1
      ansible_connection: local

  vars:
    # SSH port to configure (the SSHD role uses this)
    ssh_port: 222
    # GitLab URL as seen from the VM. 192.168.56.1 is the host machine's
    # IP on the VirtualBox private network.
    gitlab_url: "http://192.168.56.1:8080"
    # User that will run Docker commands and own the app directory
    deploy_user: vagrant
    # Application port (used by UFW rule)
    app_port: 8000
    # Node Exporter version to install
    node_exporter_version: "1.7.0"
