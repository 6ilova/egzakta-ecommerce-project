# ============================================
# Ansible Configuration
# ============================================
#
# WHY THIS FILE:
#   ansible.cfg provides default settings so you don't have to pass
#   flags on every command. Ansible looks for this file in the current
#   directory first, then ~/.ansible.cfg, then /etc/ansible/ansible.cfg.
#
# WHY host_key_checking = False:
#   On first SSH connection, the host's fingerprint is unknown.
#   With checking enabled, Ansible would prompt "Are you sure?" and fail
#   in automated pipelines. For a lab/demo environment this is acceptable.
#   In production, you'd want this enabled for security.
# ============================================

[defaults]
inventory = inventory/hosts.yml
remote_user = vagrant
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml

[privilege_escalation]
# WHY become = True:
#   Most tasks need root privileges (installing packages, configuring
#   system services). This makes sudo the default for all tasks.
become = True
become_method = sudo
become_user = root
become_ask_pass = False
