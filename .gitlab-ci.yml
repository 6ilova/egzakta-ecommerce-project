stages:
  - build
  - deploy

# Build jobs trigger only if files in their respective folders have changed
build_frontend:
  stage: build
  tags:
    - vm
  script:
    - echo "Building Frontend image..."
    - cd ecommerce-app
    - docker compose build frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      changes:
        - ecommerce-app/frontend/**/*
        - ecommerce-app/docker/frontend/**/*
        - ecommerce-app/docker-compose.yml

build_backend:
  stage: build
  tags:
    - vm
  script:
    - echo "Building Backend image..."
    - cd ecommerce-app
    - docker compose build backend
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      changes:
        - ecommerce-app/backend/**/*
        - ecommerce-app/docker/backend/**/*
        - ecommerce-app/docker-compose.yml

build_db:
  stage: build
  tags:
    - vm
  script:
    - echo "Building Database image..."
    - cd ecommerce-app
    - docker compose build db
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      changes:
        - ecommerce-app/docker/db/**/*
        - ecommerce-app/docker-compose.yml

# Deploy always runs. Docker compose will intelligently restart only changed containers.
deploy:
  stage: deploy
  tags:
    - vm
  script:
    - echo "Deploying application..."
    - cd ecommerce-app
    - cp -n .env.example .env 2>/dev/null || true
    - docker compose up -d
    - echo "Checking service status..."
    - docker compose ps
    - echo "Deployment completed! App available at http://$(hostname -I | awk '{print $1}'):8000"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  environment:
    name: production
