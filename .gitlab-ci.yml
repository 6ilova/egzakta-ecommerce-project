# ============================================
# GitLab CI/CD Pipeline
# ============================================
#
# WHAT THIS DOES:
#   On every push to main/master, this pipeline:
#   1. BUILDS Docker images for the application
#   2. DEPLOYS the application on the VM via docker compose
#
# HOW IT WORKS:
#   The GitLab Runner is installed directly on the Ubuntu VM (via Ansible)
#   with a shell executor. This means CI/CD jobs run as the gitlab-runner
#   user on the VM itself — no SSH needed.
#
#   Push to GitLab → GitLab assigns job → Runner on VM picks it up →
#   Runner clones repo → Runs docker compose → App live on port 8000
#
# WHY NO SSH:
#   The runner IS on the VM. It runs commands directly, not remotely.
#   This is simpler and more reliable than SSH-based deployment.
#
# PREREQUISITES:
#   1. GitLab Runner registered on the VM (via Ansible gitlab_runner role)
#   2. Docker and Docker Compose installed on the VM (via Ansible docker role)
#   3. gitlab-runner user in the docker group (done by Ansible)
# ============================================

stages:
  - build
  - deploy

# ============================================
# Build Stage
# ============================================
# Validates that all Docker images build successfully before deploying.
# If the build fails, the deploy stage is skipped — production stays untouched.
build:
  stage: build
  tags:
    - vm
  script:
    - echo "Building Docker images..."
    - cd ecommerce-app
    - docker compose build
    - echo "Build completed successfully"
  only:
    - main
    - master

# ============================================
# Deploy Stage
# ============================================
# Runs directly on the VM (shell executor).
# The runner already cloned the repo, so we just cd into
# the ecommerce-app directory and run docker compose.
deploy:
  stage: deploy
  tags:
    - vm
  script:
    - echo "Deploying application..."
    - cd ecommerce-app

    # Create .env from template if it doesn't exist
    - cp -n .env.example .env 2>/dev/null || true

    # Stop existing containers (if any)
    - docker compose down --remove-orphans 2>/dev/null || true

    # Build and start all services
    - docker compose up -d --build

    # Wait for services to start and MySQL to initialize
    - echo "Waiting for services to start..."
    - sleep 30

    # Verify deployment
    - echo "Checking service status..."
    - docker compose ps
    - echo "Deployment completed! App available at http://$(hostname -I | awk '{print $1}'):8000"
  only:
    - main
    - master
  environment:
    name: production
