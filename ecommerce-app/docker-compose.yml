services:
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    container_name: ecommerce-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-full-stack-ecommerce}
    ports:
      - "3306:3306"
    volumes:
      # Named volume for data persistence.
      - mysql-data:/var/lib/mysql
    networks:
      - ecommerce-network
    # Healthcheck ensures backend only starts when MySQL is ready to accept connections
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: ecommerce-backend
    environment:
      # Override the datasource URL to point to the 'db' service.
      # 'db' is resolved by Docker DNS to the MySQL container's IP.
      # The original application.properties uses localhost:3306, which
      # wouldn't work in Docker (each container has its own localhost).
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/full-stack-ecommerce?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-ecommerceapp}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-ecommerceapp}
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped


  # Angular Frontend (served by Nginx)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ============================================
  # PLG Stack
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ecommerce-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml
    networks:
      - ecommerce-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml
      # Mount Docker socket to read all container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ecommerce-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SERVER_ROOT_URL=http://192.168.56.10:8000/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    networks:
      - ecommerce-network
    restart: unless-stopped

# persists MySQL data across container restarts.
volumes:
  mysql-data:
    driver: local
  grafana-data:
    driver: local

# Custom bridge network — all services can communicate by name.
networks:
  ecommerce-network:
    driver: bridge
