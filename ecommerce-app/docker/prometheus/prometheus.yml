global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      # The VM IP address where Node Exporter is running
      - targets: ['192.168.56.10:9100']

  - job_name: 'spring-boot-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # Internal Docker DNS name for the backend service
      - targets: ['backend:8090']
