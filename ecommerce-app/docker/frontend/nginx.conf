# ============================================
# Nginx Configuration — Angular SPA + API Reverse Proxy
# ============================================
#
# This config serves two purposes:
#
# 1. SERVE ANGULAR SPA:
#    Angular is a Single Page Application — all routes (like /products,
#    /category/1) are handled client-side by JavaScript. If a user
#    refreshes on /products, Nginx must serve index.html (not 404).
#    The try_files directive handles this.
#
# 2. REVERSE PROXY FOR API:
#    The Angular source has hardcoded API URLs: http://localhost:8090/api
#    In Docker, "localhost" inside the browser still means the user's machine.
#    But the backend runs in a separate container, not on localhost.
#
#    Solution: Nginx intercepts any request to /api and forwards it to
#    the backend container (named "backend" in docker-compose.yml).
#    The Angular app in the browser calls http://localhost:8000/api/...
#    → Nginx catches /api → proxies to http://backend:8090/api/...
#
#    WAIT — but the Angular code says http://localhost:8090, not /api?
#    Yes, but when served through Nginx on port 8000, the browser
#    sends requests to localhost:8000. The Angular app's hardcoded port
#    8090 actually needs the user to have the backend on their localhost:8090
#    OR we need to modify the source. We solve this by also exposing 8090
#    in docker-compose (or the user can modify environment.prod.ts).
#    The /api proxy is an additional safety net for production deployment.
# ============================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Angular SPA Routing ----
    # try_files attempts to serve the exact file requested.
    # If not found, falls back to index.html so Angular's
    # router can handle the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API Reverse Proxy ----
    # Forward /api requests to the Spring Boot backend.
    # "backend" is the Docker Compose service name, resolved via
    # Docker's internal DNS to the backend container's IP.
    location /api {
        proxy_pass http://backend:8090/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Grafana Reverse Proxy ----
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Performance: Gzip Compression ----
    # Compress text-based responses to reduce bandwidth.
    # Images and videos are already compressed, so we skip them.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ---- Performance: Static Asset Caching ----
    # Angular prod build uses content hashing in filenames (e.g., main.abc123.js).
    # When content changes, the filename changes, so we can cache aggressively.
    # "immutable" tells browsers the file will NEVER change at this URL.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
